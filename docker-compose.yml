services:
  postgres:
    image: postgres:16-alpine
    container_name: wiki-quiz-postgres
    environment:
      POSTGRES_USER: wikiquiz
      POSTGRES_PASSWORD: wikiquiz
      POSTGRES_DB: wikiquiz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikiquiz -d wikiquiz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

